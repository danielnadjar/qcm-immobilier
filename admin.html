<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - lesite.io QCM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #0a0a0a;
            color: #f0f0f0;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 0;
            border-bottom: 1px solid #16213e;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #fff;
        }

        .logo-icon {
            font-size: 20px;
            margin-right: 8px;
        }

        .logout-btn {
            padding: 10px 20px;
            background-color: #e94560;
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background-color: #d63c52;
        }

        /* Login Section */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-form {
            width: 100%;
            max-width: 400px;
        }

        .login-form h1 {
            font-size: 32px;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #f0f0f0;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #16213e;
            background-color: #151515;
            color: #fff;
            border-radius: 6px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input[type="password"]:focus {
            outline: none;
            border-color: #e94560;
            box-shadow: 0 0 0 3px rgba(233, 69, 96, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            background-color: #e94560;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background-color: #d63c52;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(233, 69, 96, 0.3);
        }

        .error-message {
            color: #e94560;
            font-size: 14px;
            margin-top: 10px;
            text-align: center;
        }

        /* Dashboard */
        .dashboard {
            display: none;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background-color: #151515;
            padding: 25px;
            border-radius: 8px;
            border: 1px solid #16213e;
            border-left: 4px solid #e94560;
        }

        .stat-label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 36px;
            font-weight: 700;
            color: #e94560;
        }

        /* Table */
        .table-container {
            background-color: #151515;
            border-radius: 8px;
            border: 1px solid #16213e;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .table-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 1px solid #16213e;
        }

        .table-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .table-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .search-input {
            padding: 8px 12px;
            border: 1px solid #16213e;
            background-color: #0a0a0a;
            color: #fff;
            border-radius: 4px;
            font-size: 14px;
            width: 200px;
        }

        .export-btn {
            padding: 8px 16px;
            background-color: #16213e;
            color: #e94560;
            border: 1px solid #16213e;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 14px;
        }

        .export-btn:hover {
            background-color: #e94560;
            color: #fff;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background-color: #0a0a0a;
        }

        th {
            padding: 15px 20px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
            border-bottom: 1px solid #16213e;
            cursor: pointer;
            user-select: none;
            position: relative;
        }

        th:hover {
            color: #e94560;
        }

        th.sortable::after {
            content: ' ⇅';
            opacity: 0;
            transition: opacity 0.3s;
        }

        th.sortable:hover::after {
            opacity: 1;
        }

        th.sorted::after {
            opacity: 1;
            content: ' ▼';
        }

        th.sorted.asc::after {
            content: ' ▲';
        }

        td {
            padding: 15px 20px;
            border-bottom: 1px solid #16213e;
            font-size: 14px;
        }

        tbody tr:hover {
            background-color: #1a1a1a;
        }

        .score-cell {
            font-weight: 600;
            color: #e94560;
        }

        .category-score {
            font-size: 13px;
            color: #888;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .spinner {
            border: 3px solid #16213e;
            border-top: 3px solid #e94560;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 12px;
            }

            td, th {
                padding: 10px;
            }

            .search-input {
                width: 150px;
            }

            .table-controls {
                flex-wrap: wrap;
                gap: 8px;
            }

            header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div id="loginSection" class="login-container">
            <div class="login-form">
                <h1>🏠 Admin Dashboard</h1>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" placeholder="Entrez le mot de passe administrateur">
                </div>
                <button class="btn" onclick="login()">Connexion</button>
                <div class="error-message" id="loginError"></div>
            </div>
        </div>

        <!-- Dashboard -->
        <div id="dashboard" class="dashboard">
            <header>
                <div class="logo">
                    <span class="logo-icon">🏠</span>lesite.io - Admin
                </div>
                <button class="logout-btn" onclick="logout()">Déconnexion</button>
            </header>

            <!-- Stats Cards -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Total Participants</div>
                    <div class="stat-value" id="totalParticipants">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Score Moyen</div>
                    <div class="stat-value" id="averageScore">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Meilleur Score</div>
                    <div class="stat-value" id="bestScore">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Pire Score</div>
                    <div class="stat-value" id="worstScore">-</div>
                </div>
            </div>

            <!-- Submissions Table -->
            <div class="table-container">
                <div class="table-header">
                    <h2>Résultats des participants</h2>
                    <div class="table-controls">
                        <input type="text" class="search-input" id="searchInput" placeholder="Rechercher..." onkeyup="filterTable()">
                        <button class="export-btn" onclick="exportCSV()">📥 Exporter CSV</button>
                    </div>
                </div>

                <div id="tableContent">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Chargement des données...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const ADMIN_PASSWORD = 'CoachDaniel2026!';
        const API_URL = 'https://cbfypewsudbcuslhpkzx.supabase.co/functions/v1/qcm-api?admin=CoachDaniel2026!';
        let allData = [];
        let sortConfig = { key: null, direction: 'asc' };

        function login() {
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');

            if (password === ADMIN_PASSWORD) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                loadData();
            } else {
                errorDiv.textContent = 'Mot de passe incorrect';
            }
        }

        function logout() {
            document.getElementById('password').value = '';
            document.getElementById('loginError').textContent = '';
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('loginSection').style.display = 'flex';
        }

        function loadData() {
            fetch(API_URL)
                .then(response => response.text())
                .then(text => {
                    try {
                        const data = JSON.parse(text);
                        if (data.submissions) {
                            allData = data.submissions;
                            // Use stats from API if available
                            if (data.stats) {
                                document.getElementById('totalParticipants').textContent = data.stats.total_submissions || 0;
                                document.getElementById('averageScore').textContent = data.stats.avg_score || 0;
                                document.getElementById('bestScore').textContent = data.stats.best_score || 0;
                                document.getElementById('worstScore').textContent = data.stats.worst_score || 0;
                            }
                        } else if (Array.isArray(data)) {
                            allData = data;
                            updateStats();
                        } else {
                            allData = [];
                        }
                        renderTable();
                    } catch(e) {
                        console.error('Parse error:', e, 'Raw:', text.substring(0, 200));
                        document.getElementById('tableContent').innerHTML = '<div class="no-data">Erreur de format des donn\u00e9es</div>';
                    }
                })
                .catch(error => {
                    console.error('Error loading data:', error);
                    document.getElementById('tableContent').innerHTML = '<div class="no-data">Erreur lors du chargement des donn\u00e9es</div>';
                });
        }

        function updateStats() {
            const totalParticipants = allData.length;
            const scores = allData.map(d => d.score || 0);
            const averageScore = totalParticipants > 0 ? (scores.reduce((a, b) => a + b, 0) / totalParticipants).toFixed(1) : 0;
            const bestScore = totalParticipants > 0 ? Math.max(...scores) : 0;
            const worstScore = totalParticipants > 0 ? Math.min(...scores) : 0;

            document.getElementById('totalParticipants').textContent = totalParticipants;
            document.getElementById('averageScore').textContent = averageScore;
            document.getElementById('bestScore').textContent = bestScore;
            document.getElementById('worstScore').textContent = worstScore;
        }

        function renderTable() {
            if (allData.length === 0) {
                document.getElementById('tableContent').innerHTML = '<div class="no-data">Aucune donnée disponible</div>';
                return;
            }

            let html = '<table><thead><tr>';
            html += '<th class="sortable" onclick="sortTable(\'created_at\')">Date</th>';
            html += '<th class="sortable" onclick="sortTable(\'prenom\')">Prénom</th>';
            html += '<th class="sortable" onclick="sortTable(\'email\')">Email</th>';
            html += '<th class="sortable" onclick="sortTable(\'score\')">Score</th>';
            html += '<th>Négociation</th>';
            html += '<th>Loi</th>';
            html += '<th>Psychologie</th>';
            html += '</tr></thead><tbody>';

            const sortedData = [...allData].sort((a, b) => {
                if (!sortConfig.key) return 0;

                let aVal = a[sortConfig.key];
                let bVal = b[sortConfig.key];

                if (typeof aVal === 'string') {
                    aVal = aVal.toLowerCase();
                    bVal = bVal.toLowerCase();
                }

                if (sortConfig.direction === 'asc') {
                    return aVal > bVal ? 1 : aVal < bVal ? -1 : 0;
                } else {
                    return aVal < bVal ? 1 : aVal > bVal ? -1 : 0;
                }
            });

            sortedData.forEach(row => {
                const date = new Date(row.created_at || row.timestamp).toLocaleDateString('fr-FR', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                html += '<tr>';
                html += `<td>${date}</td>`;
                html += `<td>${row.prenom || row.firstName || '-'}</td>`;
                html += `<td>${row.email || '-'}</td>`;
                html += `<td class="score-cell">${row.score}/${row.total || 35}</td>`;
                html += `<td class="category-score">${row.score_negociation || 0}/${getMaxScore('Négociation prix')}</td>`;
                html += `<td class="category-score">${row.score_loi || 0}/${getMaxScore('Loi')}</td>`;
                html += `<td class="category-score">${row.score_psychologie || 0}/${getMaxScore('Psychologie vendeur/acheteur')}</td>`;
                html += '</tr>';
            });

            html += '</tbody></table>';
            document.getElementById('tableContent').innerHTML = html;
        }

        function getMaxScore(category) {
            if (category === 'Négociation prix') return 12;
            if (category === 'Loi') return 9;
            return 9;
        }

        function sortTable(key) {
            if (sortConfig.key === key) {
                sortConfig.direction = sortConfig.direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortConfig.key = key;
                sortConfig.direction = 'asc';
            }
            renderTable();
        }

        function filterTable() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const rows = document.querySelectorAll('table tbody tr');

            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(searchTerm) ? '' : 'none';
            });
        }

        function exportCSV() {
            if (allData.length === 0) {
                alert('Aucune donnée à exporter');
                return;
            }

            let csv = 'Date,Prénom,Email,Score,Négociation,Loi,Psychologie\n';

            allData.forEach(row => {
                const date = new Date(row.created_at || row.timestamp).toLocaleDateString('fr-FR', {
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });

                csv += `"${date}","${row.prenom || row.firstName || ''}","${row.email || ''}",${row.score || 0},${row.score_negociation || 0}/${getMaxScore('Négociation prix')},${row.score_loi || 0}/${getMaxScore('Loi')},${row.score_psychologie || 0}/${getMaxScore('Psychologie vendeur/acheteur')}\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `qcm-results-${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }

        // Handle enter key in password field
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && document.getElementById('loginSection').style.display !== 'none') {
                login();
            }
        });
    </script>
</body>
</html>
